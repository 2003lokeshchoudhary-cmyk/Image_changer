<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision | Professional Image Enhancer</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --accent: #06b6d4;
            --bg: #030712;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%);
        }

        /* Navbar */
        nav {
            padding: 1.5rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: #fff; text-decoration: none; }
        .logo span { color: var(--primary); }

        /* Main Website Layout */
        .main-container {
            max-width: 1100px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: 350px 1fr; /* Input on left, Output on right */
            gap: 30px;
            padding: 0 20px;
        }

        /* LEFT SIDE: INPUT CONTROLS */
        .input-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            backdrop-filter: blur(20px);
            height: fit-content;
        }
